server {
    listen 80;
    server_name payflow.luismendezdev.online;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name payflow.luismendezdev.online;

    ssl_certificate     /etc/nginx/certs-payflow/payflow.crt;
    ssl_certificate_key /etc/nginx/certs-payflow/payflow.key;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $payflow_api http://payflow_api:3000;

    location / {
        proxy_pass         $payflow_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
